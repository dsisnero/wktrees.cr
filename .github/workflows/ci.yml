name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Crystal ${{ matrix.crystal }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crystal: ["1.20.2", "latest"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Crystal
        uses: oprypin/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Install shards
        run: shards install

      - name: Format check
        run: crystal tool format --check src spec

      - name: Lint
        run: bin/ameba src spec
        shell: bash

      - name: Test
        run: crystal spec --order random

      - name: Build binary
        run: crystal build src/cli.cr -o bin/wktrees --release

      - name: Verify binary
        run: bin/wktrees --version
        shell: bash

  build-release:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Crystal
        uses: oprypin/install-crystal@v1
        with:
          crystal: latest

      - name: Install shards
        run: shards install

      - name: Build release binary
        run: crystal build src/cli.cr -o bin/wktrees --release

      - name: Set binary name for OS
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "name=wktrees.exe" >> $GITHUB_OUTPUT
            mv bin/wktrees bin/wktrees.exe
          else
            echo "name=wktrees" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wktrees-${{ matrix.os }}
          path: bin/${{ steps.binary.outputs.name }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/${{ steps.binary.outputs.name }}
